repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.10
    hooks:
      - id: uv-lock
        name: uv lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff-check
        name: ruff check

      - id: ruff-format
        name: ruff format

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        language: system
        entry: uv run ty check
        pass_filenames: false
        types: [python]
