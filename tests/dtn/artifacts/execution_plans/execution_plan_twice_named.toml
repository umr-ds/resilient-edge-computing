# Shared data that can be referenced by multiple jobs
[named_data]
wasm-module = "../wasi-smoke.wasm"
stdin = "data/stdin_input.txt"
infile = "data/infile.txt"
databin = "data/data.bin"

# First job: Run smoke test with initial data
[[jobs]]

[jobs.metadata]
wasm_module = "wasm-module"
results_receiver = "dtn://client/"
argv = ["a", "b", "c"]
stdin_file = "stdin"
dirs = ["/output", "/temp"]
stdout_file = "/output/stdout.log"
stderr_file = "/output/stderr.log"
results = ["/out.txt", "/output"]

[jobs.metadata.capabilities]
cpu_cores = 1
free_cpu_capacity = 0
free_memory = 0
free_disk_space = 0

[jobs.metadata.env]
FOO = "bar"

[jobs.metadata.data]
"/infile.txt" = "infile"
"/data.bin" = "databin"

[jobs.metadata.named_results]
"/out.txt" = "wasm_output_file"
"/output" = "output_archive"

# Second job: Run smoke test again, using the output from the first job as stdin
[[jobs]]

[jobs.metadata]
wasm_module = "wasm-module"
results_receiver = "dtn://client/"
argv = ["x", "y", "z"]
stdin_file = "wasm_output_file"
dirs = ["/output", "/temp"]
stdout_file = "/output/stdout.log"
stderr_file = "/output/stderr.log"
results = ["/out.txt", "/output"]

[jobs.metadata.capabilities]
cpu_cores = 1
free_cpu_capacity = 0
free_memory = 0
free_disk_space = 0

[jobs.metadata.env]
BAR = "baz"

[jobs.metadata.data]
"/infile.txt" = "infile"
"/data.bin" = "databin"

[jobs.metadata.named_results]
"/out.txt" = "wasm_output_file_2"
"/output" = "output_archive_2"
